<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DUOTONE — boiling threshold</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <!-- Specimen-mode overlay (path /specimens/<id>): composite layout for
       portfolio renders. Hidden by default; main.js shows it when the
       URL matches. -->
  <div id="specimen-composite" aria-hidden="true">
    <div id="specimen-panel"></div>
    <svg id="specimen-line" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="specimen-caption"></div>
    <div id="specimen-split-rule" aria-hidden="true"></div>
  </div>

  <div id="dropzone-overlay" aria-hidden="true">
    <p>DROP A VIDEO FILE ANYWHERE</p>
  </div>

  <div id="hint" class="hint visible">
    <p>DRAG AND DROP A VIDEO, IMAGE, OR AUDIO FILE</p>
    <p>OR USE THE SOURCE FOLDER (TOP RIGHT)</p>
  </div>

  <video id="source-video" playsinline muted loop crossorigin="anonymous"></video>
  <img   id="source-image" alt="" crossorigin="anonymous" />

  <script type="module" src="/src/main.js"></script>
</body>
</html>
